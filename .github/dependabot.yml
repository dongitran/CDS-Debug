version: 2
updates:
  # Keep GitHub Actions up-to-date automatically
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"

  # Keep npm/pnpm dependencies up-to-date
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    # Only open PRs for security updates to avoid noise
    open-pull-requests-limit: 5
