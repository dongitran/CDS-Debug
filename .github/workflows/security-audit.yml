name: Security Audit

on:
  push:
    branches:
      - master
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches:
      - master
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
  schedule:
    # Run every Monday at 08:00 UTC to catch newly disclosed CVEs
    - cron: '0 8 * * 1'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        # --audit-level=high only fails on high/critical severity
        run: pnpm audit --audit-level=high
